name: CI

# Lint the workflow and verify the DAG resolves against the tiny .test fixtures.
# No heavy tools are installed and no real data is processed — this is a fast
# structural check (syntax, includes, wildcards, rule wiring) that runs on every
# push and pull request.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-dryrun:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash -leo pipefail {0}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Create tested runner environment
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3
        with:
          environment-file: environment.runner.yml
          environment-name: oracle-atac-runner
          cache-environment: true
          cache-downloads: true

      - name: Verify runner
        run: |
          test "$(snakemake --version)" = "7.32.4"
          python -c 'import pandas, pysam, yaml'

      - name: Static checks
        run: |
          bash -n setup.sh run.sh scripts/setup_envs.sh
          python -m py_compile workflow/scripts/*.py tests/*.py

      - name: Unit tests
        run: python -m pytest tests/ -q

      - name: Dry-run environment smoke workflow
        run: |
          snakemake -n \
            --snakefile workflow/envs.smk \
            --workflow-profile none \
            --cores 1

      - name: Lint workflow (advisory)
        # Keep style advice visible without masking the separately gated tests.
        continue-on-error: true
        run: |
          snakemake --lint \
            --snakefile workflow/Snakefile \
            --configfile .test/test_config.yaml \
            --workflow-profile none

      - name: Dry-run DAG (test config)
        run: |
          snakemake -n \
            --snakefile workflow/Snakefile \
            --configfile .test/test_config.yaml \
            --workflow-profile none \
            --cores 2

      - name: Build DAG graph (sanity)
        run: |
          snakemake --dag \
            --snakefile workflow/Snakefile \
            --configfile .test/test_config.yaml \
            --workflow-profile none \
            --cores 2 > /dev/null
