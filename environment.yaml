# Top-level environment that provides Snakemake itself. Create it once, then run
# the pipeline with --use-conda so each rule gets its own pinned environment.
#   conda env create -f environment.yaml
#   conda activate atacseq-smk
#   snakemake --use-conda --cores 16
name: atacseq-smk
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  - python=3.11
  - snakemake-minimal=7.32.4
  - pandas=2.2
  - mamba
  - tabulate
